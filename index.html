<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tahir | Ссылки</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-blue: #324B9A; 
            --card-bg: #FFFFFF;
            --text-dark: #222222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-blue);
            color: var(--card-bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* --- Шапка профиля --- */
        .profile {
            text-align: center;
            animation: fadeInDown 0.8s ease forwards;
        }

        .avatar {
            width: 110px;
            height: 110px;
            background: var(--card-bg);
            border-radius: 50%;
            margin: 0 auto 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .profile-title {
            font-weight: 900;
            font-size: 26px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .profile-subtitle {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 500;
        }

        /* --- Кнопки соцсетей --- */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 18px 25px;
            text-decoration: none;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transform: translateY(30px);
            opacity: 0;
            animation: slideUp 0.5s ease forwards;
            /* Плавный переход для спокойного ховера */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Небольшая задержка анимации при загрузке */
        .link-card:nth-child(1) { animation-delay: 0.1s; }
        .link-card:nth-child(2) { animation-delay: 0.2s; }
        .link-card:nth-child(3) { animation-delay: 0.3s; }
        .link-card:nth-child(4) { animation-delay: 0.4s; }
        .link-card:nth-child(5) { animation-delay: 0.5s; }

        /* Спокойное увеличение при наведении */
        .link-card:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .card-title {
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .badge {
            background: var(--bg-blue);
            color: var(--card-bg);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        /* Акцентная кнопка связи (без пульсации) */
        .contact-btn {
            background: linear-gradient(135deg, #4A6BCE, #2A3F82);
            margin-top: 10px;
            justify-content: center;
        }

        .contact-btn .card-title {
            color: white;
            font-size: 18px;
        }

        /* --- Стартовые анимации (стали мягче) --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="profile">
        <div class="avatar"></div>
        <h1 class="profile-title">Tahir</h1>
        <p class="profile-subtitle">Заказать сайт</p>
    </header>

    <div class="links-wrapper">
        <a href="https://t.me/Qwe_ph1" class="link-card">
            <span class="card-title">Telegram для заказа</span>
            <span class="badge">🔗</span>
        </a>

        <a href="https://t.me/твой_канал" class="link-card">
            <span class="card-title">Telegram Канал</span>
            <span class="badge">🔗</span>
        </a>

        <a href="https://instagram.com/tahirweb" class="link-card">
            <span class="card-title">Instagram</span>
            <span class="badge">🔗</span>
        </a>

        <a href="https://tiktok.com/@твой_профиль" class="link-card">
            <span class="card-title">TikTok</span>
            <span class="badge">🔗</span>
        </a>

    </div>
</div>

</body>
</html>
